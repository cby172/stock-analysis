<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",sans-serif;background:#f5f7fa;color:#2c3e50;min-height:100vh}
body::before{content:"";position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,#e8ecf1 0%,#f5f7fa 60%);z-index:-1}
.nav{display:flex;gap:12px;justify-content:center;padding:18px 20px 6px;flex-wrap:wrap}
.nav a{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;text-decoration:none;color:#6b7c93;background:#fff;border:1px solid #e2e8f0;transition:.2s}
.nav a:hover,.nav a.active{color:#3182ce;border-color:#3182ce;background:#f0f6ff}
.header{text-align:center;padding:18px 20px 20px}
.header h1{font-size:28px;font-weight:700;color:#1a202c;margin-bottom:4px}
.header .sub{font-size:13px;color:#6b7c93}
.stats{display:flex;justify-content:center;gap:20px;margin:0 auto 20px;max-width:900px;padding:0 20px;flex-wrap:wrap}
.stat{text-align:center;padding:10px 18px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;min-width:90px}
.stat-num{font-size:20px;font-weight:700;color:#3182ce}
.stat-label{font-size:11px;color:#8b949e;margin-top:2px}
.search{max-width:500px;margin:0 auto 20px;padding:0 20px}
.search input{width:100%;padding:10px 14px;font-size:14px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;color:#2c3e50;outline:none;font-family:inherit;transition:.2s}
.search input:focus{border-color:#3182ce;box-shadow:0 0 0 3px rgba(49,130,206,.1)}
.container{max-width:1000px;margin:0 auto;padding:0 20px 50px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px;text-decoration:none;color:inherit;display:block;transition:.25s;position:relative;overflow:hidden}
.card:hover{border-color:#3182ce;transform:translateY(-2px);box-shadow:0 8px 24px rgba(49,130,206,.08)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.card-name{font-size:17px;font-weight:700;color:#1a202c}
.card-code{font-size:11px;color:#a0aec0;font-weight:500}
.card-badges{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.bdg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.bdg-ind{background:rgba(49,130,206,.1);color:#3182ce}
.bdg-val{background:rgba(47,133,90,.1);color:#2f855a}
.bdg-signal-bullish{background:rgba(47,133,90,.12);color:#2f855a}
.bdg-signal-hold{background:rgba(214,158,46,.12);color:#d69e2e}
.bdg-signal-bearish{background:rgba(197,48,48,.1);color:#c53030}
.metrics{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.metric{flex:1;min-width:50px;text-align:center;padding:6px 4px;background:#f7fafc;border-radius:6px}
.metric-val{font-size:13px;font-weight:700;color:#2c3e50}
.metric-lbl{font-size:9px;color:#a0aec0}
.conclusion{font-size:12px;line-height:1.6;color:#6b7c93}
.empty{text-align:center;padding:40px;color:#a0aec0;grid-column:1/-1}
.empty .icon{font-size:36px;margin-bottom:8px}
.footer{text-align:center;padding:16px;color:#a0aec0;font-size:11px}
@media(max-width:600px){.grid{grid-template-columns:1fr}.header h1{font-size:22px}.stats{gap:10px}.stat{padding:8px 12px;min-width:70px}}
</style>
</head>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研究汇总 - 股票快速预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei","PingFang SC","Helvetica Neue",sans-serif;background:#f5f7fa;color:#2c3e50;min-height:100vh}
body::before{content:"";position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 50% 0%,#e8ecf1 0%,#f5f7fa 60%);z-index:-1}

.nav{display:flex;gap:12px;justify-content:center;padding:18px 20px 6px}
.nav a{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;text-decoration:none;color:#6b7c93;background:#fff;border:1px solid #e2e8f0;transition:.2s}
.nav a:hover,.nav a.active{color:#3182ce;border-color:#3182ce;background:#f0f6ff}

.header{text-align:center;padding:18px 20px 20px}
.header h1{font-size:28px;font-weight:700;color:#1a202c;margin-bottom:4px}
.header .sub{font-size:13px;color:#6b7c93}

.stats{display:flex;justify-content:center;gap:20px;margin:0 auto 20px;max-width:900px;padding:0 20px;flex-wrap:wrap}
.stat{text-align:center;padding:10px 18px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;min-width:90px}
.stat-num{font-size:20px;font-weight:700;color:#3182ce}
.stat-label{font-size:11px;color:#8b949e;margin-top:2px}

.search{max-width:500px;margin:0 auto 20px;padding:0 20px}
.search input{width:100%;padding:10px 14px;font-size:14px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;color:#2c3e50;outline:none;font-family:inherit;transition:.2s}
.search input:focus{border-color:#3182ce;box-shadow:0 0 0 3px rgba(49,130,206,.1)}

.container{max-width:1000px;margin:0 auto;padding:0 20px 50px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:18px;text-decoration:none;color:inherit;display:block;transition:.25s;position:relative;overflow:hidden}
.card:hover{border-color:#3182ce;transform:translateY(-2px);box-shadow:0 8px 24px rgba(49,130,206,.08)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-name{font-size:17px;font-weight:700;color:#1a202c}
.card-code{font-size:11px;color:#a0aec0;font-weight:500}
.card-badges{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.bdg{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.bdg-ind{background:rgba(49,130,206,.1);color:#3182ce}
.bdg-val{background:rgba(47,133,90,.1);color:#2f855a}
.bdg-signal-bullish{background:rgba(47,133,90,.12);color:#2f855a}
.bdg-signal-hold{background:rgba(214,158,46,.12);color:#d69e2e}
.bdg-signal-bearish{background:rgba(197,48,48,.1);color:#c53030}
.metrics{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.metric{flex:1;min-width:50px;text-align:center;padding:6px 4px;background:#f7fafc;border-radius:6px}
.metric-val{font-size:13px;font-weight:700;color:#2c3e50}
.metric-lbl{font-size:9px;color:#a0aec0}
.conclusion{font-size:12px;line-height:1.6;color:#6b7c93}

.empty{text-align:center;padding:40px;color:#a0aec0;grid-column:1/-1}
.empty .icon{font-size:36px;margin-bottom:8px}

.footer{text-align:center;padding:16px;color:#a0aec0;font-size:11px}

@media(max-width:600px){.grid{grid-template-columns:1fr}.header h1{font-size:22px}.stats{gap:10px}.stat{padding:8px 12px;min-width:70px}}
</style>
</head>
<body>

<div class="nav">
  <a href="index.html">🏠 首页</a>
  <a href="knowledge.html">📚 知识库</a>
  <a href="research.html" class="active">📋 研究汇总</a>
</div>

<div class="header">
  <h1>📋 研究汇总 · 快速预览</h1>
  <p class="sub">11家公司 · 一键纵览估值与核心结论</p>
</div>

<div class="stats" id="statsBar"></div>

<div class="search">
  <input type="text" id="search" placeholder="筛选公司、行业..." autocomplete="off">
</div>

<div class="container">
  <div class="grid" id="cardGrid"></div>
</div>

<div class="footer">© 2026 · 数据仅供研究参考，不构成投资建议</div>

<script>
(function(){
  var data=[{"name":"中信证券","code":"600030.SH","industry":"证券","price":"25.22","pb":"1.15","pe":"4.5","valMethod":"市净率(P/B)","roe":"7-10%","rating":"周期底部布局","conclusion":"国内券商绝对龙头，P/B 1.15x处历史低位。本质是周期底部布局型投资。","signal":"hold"},{"name":"中国中免","code":"601888.SH","industry":"免税零售","price":"","pb":"","pe":"44","valMethod":"市盈率(PE)","roe":"5.9%","rating":"谨慎观望","conclusion":"毛利率持续下行(51%→32%)，低PE可能是价值陷阱信号","signal":"bearish"},{"name":"比亚迪","code":"002594.SZ","industry":"新能源汽车","price":"","pb":"1.05","pe":"9.8","valMethod":"PE+PEG","roe":"","rating":"估值底部布局","conclusion":"全球最大新能源车企，垂直一体化护城河深。PE 9.8x已反映悲观预期。","signal":"hold"},{"name":"贵州茅台","code":"600519.SH","industry":"白酒","price":"","pb":"","pe":"14.6","valMethod":"DCF+PE","roe":"","rating":"低估值区域","conclusion":"A股最强产品公司。14.6x PE处近10年最低，多重估值均指向低估区域。","signal":"bullish"},{"name":"中国广核","code":"003816.SZ","industry":"核电","price":"","pb":"","pe":"22.5","valMethod":"市盈率","roe":"9%","rating":"稳健持有","conclusion":"核电双寡头，现金流充沛。PE 22.5x历史偏低分位，安全边际充足。","signal":"hold"},{"name":"中国核电","code":"601985.SH","industry":"核电","price":"","pb":"1.61","pe":"","valMethod":"市盈率","roe":"8.2%","rating":"等待回调","conclusion":"垄断牌照+稳定现金流，但ROE持续下降，负债率69%。估值已反映成长预期。","signal":"bearish"},{"name":"中芯国际","code":"688981.SH","industry":"半导体","price":"","pb":"6.8","pe":"204.5","valMethod":"市净率(P/B)","roe":"3.4%","rating":"估值过高","conclusion":"晶圆代工基石企业。P/B 6.8x、ROE仅3.4%，估值已远远脱离基本面。","signal":"bearish"},{"name":"寒武纪","code":"688256.SH","industry":"AI芯片","price":"1205.29","pb":"42.9","pe":"244.5","valMethod":"市盈率","roe":"","rating":"估值透支","conclusion":"国产AI芯片稀缺标的。PE 244.5x已过度反映未来数年的增长预期。","signal":"bearish"},{"name":"片仔癀","code":"600436.SH","industry":"中药","price":"","pb":"5.0","pe":"33.5","valMethod":"市盈率","roe":"15-28%","rating":"拐点观察","conclusion":"国家绝密配方护城河强。但2025年营收/利润首降，经营现金流断崖，需等待企稳。","signal":"bearish"},{"name":"牧原股份","code":"002714.SZ","industry":"生猪养殖","price":"","pb":"2.5","pe":"12.1","valMethod":"市净率(P/B)","roe":"","rating":"收获期观察","conclusion":"全球最大养猪企业，成本行业最优。FCF首次转正，从扩张期进入收获期。","signal":"hold"},{"name":"迈瑞医疗","code":"300760.SZ","industry":"医疗器械","price":"149.98","pb":"4.77","pe":"22.3","valMethod":"市盈率","roe":"","rating":"集采压力观望","conclusion":"医疗器械龙头。PE 22.3x历史低位，等待IVD集采落地后的企稳信号。","signal":"hold"}];

  var grid=document.getElementById('cardGrid');
  var search=document.getElementById('search');
  var stats=document.getElementById('statsBar');

  var sigMap={bullish:'看好',hold:'中性',bearish:'谨慎'};
  var sigColor={bullish:'bdg-signal-bullish',hold:'bdg-signal-hold',bearish:'bdg-signal-bearish'};

  function render(list){
    var industries={};data.forEach(function(d){industries[d.industry]=1});
    var indCount=Object.keys(industries).length;
    stats.innerHTML='<div class="stat"><div class="stat-num">'+data.length+'</div><div class="stat-label">公司总数</div></div><div class="stat"><div class="stat-num">'+indCount+'</div><div class="stat-label">覆盖行业</div></div><div class="stat"><div class="stat-num">'+data.filter(function(d){return d.signal==='bullish'}).length+'</div><div class="stat-label">看好</div></div><div class="stat"><div class="stat-num">'+data.filter(function(d){return d.signal==='hold'}).length+'</div><div class="stat-label">中性</div></div><div class="stat"><div class="stat-num">'+data.filter(function(d){return d.signal==='bearish'}).length+'</div><div class="stat-label">谨慎</div></div>';

    if(list.length===0){grid.innerHTML='<div class="empty"><div class="icon">🔎</div><div>没有匹配的公司</div></div>';return}
    var h='';
    list.forEach(function(d){
      var metricRows='';
      if(d.pe)metricRows+='<div class="metric"><div class="metric-val">'+d.pe+'x</div><div class="metric-lbl">PE</div></div>';
      if(d.pb)metricRows+='<div class="metric"><div class="metric-val">'+d.pb+'x</div><div class="metric-lbl">P/B</div></div>';
      if(d.roe)metricRows+='<div class="metric"><div class="metric-val">'+d.roe+'</div><div class="metric-lbl">ROE</div></div>';
      if(d.price)metricRows+='<div class="metric"><div class="metric-val">'+d.price+'</div><div class="metric-lbl">股价</div></div>';
      if(d.valMethod)metricRows+='<div class="metric"><div class="metric-val" style="font-size:10px">'+d.valMethod+'</div><div class="metric-lbl">方法</div></div>';

      h+='<a class="card" href="reports/'+d.name+'.html"><div class="card-head"><div class="card-name">'+d.name+'</div><div class="card-code">'+d.code+'</div></div><div class="card-badges"><span class="bdg bdg-ind">'+d.industry+'</span><span class="bdg '+sigColor[d.signal]+'">'+sigMap[d.signal]+'</span><span class="bdg bdg-val">'+d.rating+'</span></div>'+(metricRows?'<div class="metrics">'+metricRows+'</div>':'')+'<div class="conclusion">'+d.conclusion+'</div></a>';
    });
    grid.innerHTML=h;
  }

  render(data);

  search.addEventListener('input',function(){
    var q=this.value.trim().toLowerCase();
    if(!q){render(data);return}
    var f=data.filter(function(d){
      return d.name.indexOf(q)!==-1||d.code.toLowerCase().indexOf(q)!==-1||d.industry.indexOf(q)!==-1||d.rating.indexOf(q)!==-1
    });
    render(f);
  });
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票深度分析报告</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 0%, #1a2332 0%, #0d1117 60%);
  z-index: -1;
}

.header {
  text-align: center;
  padding: 60px 20px 30px;
  position: relative;
}
.header::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 3px;
  background: linear-gradient(90deg, #238636, #58a6ff);
  border-radius: 2px;
}
.header h1 {
  font-size: 32px;
  font-weight: 700;
  background: linear-gradient(135deg, #58a6ff, #3fb950);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  letter-spacing: 2px;
}
.header .subtitle {
  font-size: 14px;
  color: #8b949e;
  letter-spacing: 1px;
}

.search-wrap {
  max-width: 600px;
  margin: 0 auto 40px;
  padding: 0 20px;
  position: relative;
}
.search-wrap input {
  width: 100%;
  padding: 14px 20px 14px 48px;
  font-size: 15px;
  border: 1px solid #30363d;
  border-radius: 12px;
  background: #161b22;
  color: #c9d1d9;
  outline: none;
  transition: all 0.25s ease;
  font-family: inherit;
}
.search-wrap input:focus {
  border-color: #58a6ff;
  box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
  background: #1c2129;
}
.search-wrap input::placeholder { color: #484f58; }
.search-icon {
  position: absolute;
  left: 36px;
  top: 50%;
  transform: translateY(-50%);
  color: #484f58;
  font-size: 17px;
  pointer-events: none;
}

.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px 60px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
}

.card {
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 14px;
  padding: 24px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  color: inherit;
  display: block;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #238636, #58a6ff);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.card:hover {
  border-color: #58a6ff;
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(88, 166, 255, 0.12);
  background: #1c2129;
}
.card:hover::before { opacity: 1; }

.card .badge-row {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}
.badge-code {
  background: rgba(88, 166, 255, 0.15);
  color: #58a6ff;
}
.badge-industry {
  background: rgba(63, 185, 80, 0.12);
  color: #3fb950;
}

.card .name {
  font-size: 20px;
  font-weight: 700;
  color: #e6edf3;
  margin-bottom: 6px;
}
.card .summary {
  font-size: 13px;
  color: #8b949e;
  line-height: 1.6;
  margin-bottom: 16px;
}
.card .date {
  font-size: 12px;
  color: #484f58;
  display: flex;
  align-items: center;
  gap: 5px;
}
.card .date::before {
  content: "📅";
  font-size: 12px;
}

.empty {
  text-align: center;
  padding: 60px 20px;
  color: #484f58;
  grid-column: 1 / -1;
}
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty .text { font-size: 15px; }

.stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-bottom: 36px;
  flex-wrap: wrap;
}
.stat-item {
  text-align: center;
  padding: 12px 24px;
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 10px;
}
.stat-item .num { font-size: 24px; font-weight: 700; color: #58a6ff; }
.stat-item .label { font-size: 12px; color: #8b949e; margin-top: 2px; }

.footer {
  text-align: center;
  padding: 20px;
  color: #484f58;
  font-size: 12px;
}

@media (max-width: 600px) {
  .header h1 { font-size: 24px; }
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📊 股票深度分析报告</h1>
  <p class="subtitle">基于财务数据的投资价值研究</p>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input type="text" id="search" placeholder="搜索公司名称、股票代码或行业..." autocomplete="off">
</div>

<div class="container">
  <div class="stats">
    <div class="stat-item"><div class="num" id="totalCount">4</div><div class="label">分析报告</div></div>
  </div>
  <div class="grid" id="cardGrid"></div>
</div>

<div class="footer">
  © 2026 股票分析报告 · 数据仅供研究参考，不构成投资建议
</div>

<script>
(async function() {
  const res = await fetch('data.json');
  const data = await res.json();
  const grid = document.getElementById('cardGrid');
  const search = document.getElementById('search');
  const totalEl = document.getElementById('totalCount');

  function render(list) {
    totalEl.textContent = list.length;
    if (list.length === 0) {
      grid.innerHTML = '<div class="empty"><div class="icon">🔎</div><div class="text">没有匹配的报告，试试其他关键词</div></div>';
      return;
    }
    grid.innerHTML = list.map(r => `
      <a class="card" href="${r.file}">
        <div class="badge-row">
          <span class="badge badge-code">${r.code}</span>
          <span class="badge badge-industry">${r.industry}</span>
        </div>
        <div class="name">${r.name}</div>
        <div class="summary">${r.summary}</div>
        <div class="date">${r.date}</div>
      </a>
    `).join('');
  }

  search.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    if (!q) { render(data); return; }
    const filtered = data.filter(r =>
      r.name.toLowerCase().includes(q) ||
      r.code.toLowerCase().includes(q) ||
      r.industry.toLowerCase().includes(q) ||
      r.summary.toLowerCase().includes(q)
    );
    render(filtered);
  });

  render(data);
})();
</script>

</body>
</html>
